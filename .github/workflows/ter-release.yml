name: TER release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Publish to TER
    runs-on: ubuntu-latest
    env:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor

      - name: Publish to TER
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          php ~/.composer/vendor/bin/tailor set-version "$VERSION"
          php ~/.composer/vendor/bin/tailor ter:publish \
            --comment "Release $VERSION" "$VERSION"
